services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: carrot-postgres
    environment:
      POSTGRES_DB: carrot_pipeline
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root1234@
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: carrot-redis
    ports:
      - "6378:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  # Kafka (KRaft 모드)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: carrot-kafka
    ports:
      - "29092:29092"
    environment:
      # KRaft 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 리스너 설정
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 클러스터 설정
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 토픽 자동 생성 비활성화 (명시적으로 관리)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # 로그 보존
      KAFKA_LOG_RETENTION_HOURS: 24

  # Kafka 초기 토픽 생성
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: carrot-kafka-init
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1
      while [ $$? -ne 0 ]; do
        sleep 2
        kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1
      done
      
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events.DLT --partitions 1 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:9092 --list
      "

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: carrot-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: carrot-redis-commander
    ports:
      - "8091:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  postgres_data:
